{% load static %}
<!-- Primer Noticia Section -->
<div class="w-full h-[14.5rem] lg:h-[25rem]">
{% if noticia.imagenes.first.imagen %}
    <img class="w-full h-full object-top object-cover" 
        src="{{ noticia.imagenes.first.imagen.url }}"
        alt="Imagen de la noticia {{ noticia.titulo }}">
{% else%}
    <img class="w-full h-full object-top object-cover" 
        src="{% static 'images/ineterpo.webp' %}"
        alt="Imagen de la noticia {{ noticia.titulo }}">
{% endif %}
</div>
<small class="absolute bg-primary p-2 text-xs text-white top-0 right-0 lowercase"> {{ noticia.fecha|date }} </small>
<div class="grid box-border px-3 border-t">
    <p class="text-sm text-red-700 leading-7">{{ noticia.tipo }}</p>
    <h2 class="font-semibold text-2xl leading-none">{{ noticia.titulo }}</h2>
    <p class="truncate font-light text-sm">{{ noticia.descripcion }}</p>
</div>
