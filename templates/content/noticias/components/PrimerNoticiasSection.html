<!-- Primer Noticia Section -->
{% load static %}

{% if noticia.imagenes %}
        <div class="w-full h-[25rem]">
            <img class="w-full h-full object-top object-cover" 
                src="
                {% if noticia.imagenes.firts.imagen.url %} 
                    {{ noticia.imagenes.first.imagen.url }}
                {% else %} 
                    {% static 'images/ineterpo.webp' %}
                {% endif %}" 
                alt="Imagen de la noticia {{ noticia.titulo }}">
        </div>
{% endif %}
<small class="absolute bg-primary p-2 text-white top-0 right-0 lowercase font-custom">{{ noticia.fecha }}</small>
<div class="grid box-border p-3">
    <p class="text-sm text-red-700 leading-none font-custom">{{ noticia.tipo }}</p>
    <h2 class="font-semibold text-2xl font-custom">{{ noticia.titulo }}</h2>
    <p class="text-base truncate font-light">{{ noticia.descripcion }}</p>
</div>
