{% load static %}
<!-- Otras Noticias Section -->
<div class="w-full h-[6.5rem] lg:h-[10rem]">
{% if noticia.imagenes.first.imagen %}
    <img class="w-full h-full object-top object-cover" 
        src="{{ noticia.imagenes.first.imagen.url }}"
        alt="Imagen de la noticia {{ noticia.titulo }}">
{% else%}
    <img class="w-full h-full object-top object-cover" 
        src="{% static 'images/ineterpo.webp' %}"
        alt="Imagen de la noticia {{ noticia.titulo }}">
{% endif %}
</div>
<small class="absolute top-0 right-0 p-1 lowercase bg-primary text-white text-[10px]"> {{ noticia.fecha|date }} </small>
<div class="grid box-border px-2 border-t border-gray-200 lg:px-3 lg:py-2">
    <p class="font-normal text-[10px] text-red-700 leading-5"> {{ noticia.tipo }} </p>
    <h2 class="font-semibold text-sm leading-none">{{ noticia.titulo }}</h2>
    <p class="text-[10px] truncate font-light">{{ noticia.descripcion }}</p>
</div>
